server {
    listen 80;
    listen [::]:80;
    server_name 185.221.154.185;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 185.221.154.185;

    ssl_certificate /etc/letsencrypt/live/185.221.154.185/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/185.221.154.185/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:WEBTSTU_SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 50M;

    location /static/ {
        alias /opt/webtstu/app/staticfiles/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://unix:/run/webtstu/gunicorn.sock;
        proxy_connect_timeout 30s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
